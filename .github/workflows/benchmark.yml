# Benchmark（eval）—— 會真實呼叫 Claude API（花錢、需 secret），故【不】在每次 push 跑，
# 改為手動觸發（workflow_dispatch）或每週排程。需在 repo Settings → Secrets 設 ANTHROPIC_API_KEY。
name: Benchmark

on:
  workflow_dispatch:
    inputs:
      model:
        description: "模型"
        default: "claude-haiku-4-5"
      min_pass_rate:
        description: "通過率門檻 0..1（低於則 job 失敗；0=不檢查）"
        default: "0"
  schedule:
    - cron: "0 3 * * 1" # 每週一 03:00 UTC

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 跑分
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          go run ./cmd/bench \
            -model "${{ github.event.inputs.model || 'claude-haiku-4-5' }}" \
            -out ./bench-reports \
            -min-pass-rate "${{ github.event.inputs.min_pass_rate || '0' }}"

      - name: 上傳 JSON 報告（即使失敗也傳，供儀表板）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: bench-reports/
